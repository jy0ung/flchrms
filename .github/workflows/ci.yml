name: CI

on:
  push:
    branches:
      - main
      - development
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - development
  workflow_dispatch:
    inputs:
      run_phase3b_e2e:
        description: "Run Phase 3B RBAC Playwright E2E against local Supabase"
        required: false
        default: false
        type: boolean
      run_phase7_notifications_e2e:
        description: "Run Phase 7 notifications Playwright E2E against local Supabase"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

env:
  NODE_VERSION: "20"
  SUPABASE_CLI_VERSION: "2.76.14"
  CI: true

jobs:
  frontend-quality:
    name: Frontend Quality (lint/test/build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Build/test use placeholders unless an E2E job builds against local Supabase.
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-key
      VITE_SUPABASE_PROJECT_ID: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --quiet

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  db-sql-regression:
    name: DB SQL Regression (Supabase local)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset local DB and apply migrations
        run: yes | supabase db reset --local

      - name: Detect Supabase DB container for SQL test scripts
        shell: bash
        run: |
          set -euo pipefail
          DB_CONTAINER="$(docker ps --format '{{.Names}}' | grep -E '(^supabase-db$|^supabase_db_)' | head -n1 || true)"
          if [[ -z "${DB_CONTAINER}" ]]; then
            echo "Unable to detect Supabase DB container name."
            docker ps --format '{{.Names}}'
            exit 1
          fi
          echo "Detected Supabase DB container: ${DB_CONTAINER}"
          echo "SUPABASE_DB_CONTAINER=${DB_CONTAINER}" >> "${GITHUB_ENV}"

      - name: Run DB SQL regression suites
        run: npm run test:db:sql

      - name: Validate bootstrap defaults SQL (idempotent apply)
        run: |
          npm run db:bootstrap:defaults:apply:local
          npm run db:bootstrap:defaults:apply:local

      - name: Validate bootstrap platform SQL (idempotent apply)
        run: |
          npm run db:bootstrap:platform:apply:local
          npm run db:bootstrap:platform:apply:local

      - name: Regenerate Supabase types (drift check)
        run: npm run types:supabase:gen:local

      - name: Export public schema snapshot (drift check)
        run: npm run db:snapshot:public

      - name: Build default schema compatibility bundle (drift check)
        run: npm run db:build:default-schema:compat

      - name: Verify generated artifacts are committed
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- \
            src/integrations/supabase/types.ts \
            supabase/schema_snapshot.public.sql \
            supabase/default_schema.sql

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  e2e-phase3b-rbac:
    name: E2E RBAC (Phase 3B)
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - db-sql-regression
    permissions:
      contents: read
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_phase3b_e2e)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset local DB and apply migrations
        run: yes | supabase db reset --local

      - name: Detect Supabase DB container
        shell: bash
        run: |
          set -euo pipefail
          DB_CONTAINER="$(docker ps --format '{{.Names}}' | grep -E '(^supabase-db$|^supabase_db_)' | head -n1 || true)"
          if [[ -z "${DB_CONTAINER}" ]]; then
            docker ps --format '{{.Names}}'
            exit 1
          fi
          echo "SUPABASE_DB_CONTAINER=${DB_CONTAINER}" >> "${GITHUB_ENV}"

      - name: Export local Supabase API env for frontend build
        shell: bash
        run: |
          set -euo pipefail
          STATUS_ENV="$(supabase status -o env)"
          echo "${STATUS_ENV}" | grep -E '^(API_URL|ANON_KEY)='
          API_URL="$(echo "${STATUS_ENV}" | grep '^API_URL=' | cut -d= -f2-)"
          ANON_KEY="$(echo "${STATUS_ENV}" | grep '^ANON_KEY=' | cut -d= -f2-)"
          if [[ -z "${API_URL}" || -z "${ANON_KEY}" ]]; then
            echo "Failed to extract API_URL/ANON_KEY from supabase status."
            exit 1
          fi
          echo "E2E_BASE_URL=http://127.0.0.1:4173" >> "${GITHUB_ENV}"
          echo "VITE_SUPABASE_URL=${API_URL}" >> "${GITHUB_ENV}"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}" >> "${GITHUB_ENV}"
          echo "VITE_SUPABASE_PROJECT_ID=local-ci" >> "${GITHUB_ENV}"

      - name: Build frontend (local Supabase)
        run: npm run build

      - name: Start preview server
        shell: bash
        run: |
          set -euo pipefail
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:4173" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Vite preview did not start in time."
          cat preview.log || true
          exit 1

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Phase 3B RBAC E2E
        env:
          E2E_EMPLOYEE_IDENTIFIER: employee.test
          E2E_EMPLOYEE_PASSWORD: Test1234!
          E2E_MANAGER_IDENTIFIER: manager.test
          E2E_MANAGER_PASSWORD: Test1234!
          E2E_HR_IDENTIFIER: hr.test
          E2E_HR_PASSWORD: Test1234!
          E2E_ADMIN_IDENTIFIER: admin.test
          E2E_ADMIN_PASSWORD: Test1234!
          E2E_DIRECTOR_IDENTIFIER: director.test
          E2E_DIRECTOR_PASSWORD: Test1234!
        run: npm run test:rbac:e2e:phase3b

      - name: Upload E2E artifacts (Phase 3B)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-phase3b-artifacts
          path: |
            playwright-report/
            test-results/
            preview.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop preview server
        if: always()
        shell: bash
        run: |
          if [[ -f preview.pid ]]; then kill "$(cat preview.pid)" || true; fi

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  e2e-phase7-notifications:
    name: E2E Notifications (Phase 7)
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - db-sql-regression
    permissions:
      contents: read
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_phase7_notifications_e2e)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Start local Supabase stack
        run: supabase start

      - name: Reset local DB and apply migrations
        run: yes | supabase db reset --local

      - name: Detect Supabase DB container
        shell: bash
        run: |
          set -euo pipefail
          DB_CONTAINER="$(docker ps --format '{{.Names}}' | grep -E '(^supabase-db$|^supabase_db_)' | head -n1 || true)"
          if [[ -z "${DB_CONTAINER}" ]]; then
            docker ps --format '{{.Names}}'
            exit 1
          fi
          echo "SUPABASE_DB_CONTAINER=${DB_CONTAINER}" >> "${GITHUB_ENV}"

      - name: Seed Phase 7 notifications UI fixtures
        shell: bash
        run: |
          set -euo pipefail
          docker exec -i "${SUPABASE_DB_CONTAINER}" psql -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            emp_id uuid;
            admin_id uuid;
          BEGIN
            SELECT id INTO emp_id FROM public.profiles WHERE email = 'employee@flchrms.test' LIMIT 1;
            SELECT id INTO admin_id FROM public.profiles WHERE email = 'admin@flchrms.test' LIMIT 1;

            IF emp_id IS NULL OR admin_id IS NULL THEN
              RAISE EXCEPTION 'Seeded employee/admin profiles not found for Phase 7 notification fixtures.';
            END IF;

            INSERT INTO public.user_notifications (
              id, user_id, category, event_type, title, message, read_at, source_table, source_id, metadata
            )
            VALUES (
              '97000000-0000-0000-0000-000000000001',
              emp_id,
              'leave',
              'phase7_ci_read_notification',
              'Phase 7 Read Notification',
              'CI fixture notification for mark unread test',
              now() - interval '1 hour',
              'ci_fixture',
              '97000000-0000-0000-0000-000000000001',
              jsonb_build_object('fixture', true)
            )
            ON CONFLICT (id) DO UPDATE
              SET user_id = EXCLUDED.user_id,
                  category = EXCLUDED.category,
                  event_type = EXCLUDED.event_type,
                  title = EXCLUDED.title,
                  message = EXCLUDED.message,
                  read_at = EXCLUDED.read_at,
                  source_table = EXCLUDED.source_table,
                  source_id = EXCLUDED.source_id,
                  metadata = EXCLUDED.metadata;

            INSERT INTO public.user_notifications (
              id, user_id, category, event_type, title, message, source_table, source_id, metadata
            )
            VALUES (
              '97000000-0000-0000-0000-000000000002',
              admin_id,
              'admin',
              'phase7_ci_workflow_config_notification',
              'Workflow Config Changed',
              'CI fixture admin workflow configuration notification',
              'ci_fixture',
              '97000000-0000-0000-0000-000000000002',
              jsonb_build_object('fixture', true)
            )
            ON CONFLICT (id) DO UPDATE
              SET user_id = EXCLUDED.user_id,
                  category = EXCLUDED.category,
                  event_type = EXCLUDED.event_type,
                  title = EXCLUDED.title,
                  message = EXCLUDED.message,
                  source_table = EXCLUDED.source_table,
                  source_id = EXCLUDED.source_id,
                  metadata = EXCLUDED.metadata;

            INSERT INTO public.workflow_config_events (
              id, workflow_type, workflow_table, workflow_row_id, requester_role, department_id,
              action, changed_by_user_id, changed_by_role, old_values, new_values, metadata
            )
            VALUES (
              '97000000-0000-0000-0000-000000000101',
              'approval',
              'leave_approval_workflows',
              '79000000-0000-0000-0000-000000000001',
              'employee',
              NULL,
              'update',
              admin_id,
              'admin',
              jsonb_build_object('notes', 'Old notes'),
              jsonb_build_object('notes', 'Workflow settings updated by CI fixture'),
              jsonb_build_object('fixture', true)
            )
            ON CONFLICT (id) DO UPDATE
              SET changed_by_user_id = EXCLUDED.changed_by_user_id,
                  changed_by_role = EXCLUDED.changed_by_role,
                  old_values = EXCLUDED.old_values,
                  new_values = EXCLUDED.new_values,
                  metadata = EXCLUDED.metadata;
          END
          $$;
          SQL

      - name: Export local Supabase API env for frontend build
        shell: bash
        run: |
          set -euo pipefail
          STATUS_ENV="$(supabase status -o env)"
          API_URL="$(echo "${STATUS_ENV}" | grep '^API_URL=' | cut -d= -f2-)"
          ANON_KEY="$(echo "${STATUS_ENV}" | grep '^ANON_KEY=' | cut -d= -f2-)"
          echo "E2E_BASE_URL=http://127.0.0.1:4173" >> "${GITHUB_ENV}"
          echo "VITE_SUPABASE_URL=${API_URL}" >> "${GITHUB_ENV}"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${ANON_KEY}" >> "${GITHUB_ENV}"
          echo "VITE_SUPABASE_PROJECT_ID=local-ci" >> "${GITHUB_ENV}"

      - name: Build frontend (local Supabase)
        run: npm run build

      - name: Start preview server
        shell: bash
        run: |
          set -euo pipefail
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          echo $! > preview.pid
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:4173" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Vite preview did not start in time."
          cat preview.log || true
          exit 1

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Phase 7 notifications E2E
        env:
          E2E_EMPLOYEE_IDENTIFIER: employee.test
          E2E_EMPLOYEE_PASSWORD: Test1234!
          E2E_ADMIN_IDENTIFIER: admin.test
          E2E_ADMIN_PASSWORD: Test1234!
        run: npm run test:e2e:notifications

      - name: Upload E2E artifacts (Phase 7)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-phase7-notifications-artifacts
          path: |
            playwright-report/
            test-results/
            preview.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop preview server
        if: always()
        shell: bash
        run: |
          if [[ -f preview.pid ]]; then kill "$(cat preview.pid)" || true; fi

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup

  release-bundle:
    name: Release Bundle (tag)
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - db-sql-regression
      - e2e-phase3b-rbac
      - e2e-phase7-notifications
    permissions:
      contents: read
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Build release bundle
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          mkdir -p release
          tar -czf "release/hrms-${TAG_NAME}.tar.gz" \
            dist \
            supabase/migrations \
            supabase/default_schema.sql \
            supabase/schema_snapshot.public.sql \
            supabase/bootstrap_platform.sql \
            supabase/bootstrap_defaults.sql \
            docs/admin-architecture.md \


      - name: Upload release bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: release/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  publish-github-release:
    name: Publish GitHub Release (tag)
    runs-on: ubuntu-latest
    needs:
      - release-bundle
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
